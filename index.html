<!DOCTYPE html>
<html>
<head>
<title>Showroom Vehicle Blocking Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}
body{font-family:'Segoe UI',Arial;margin:0;background:#f4f6f9;color:#333;}

header{
background:#1f3c88;
color:white;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
gap:18px;
font-size:24px;
font-weight:600;
flex-wrap:wrap;
}

.logo{
height:70px;
background:white;
padding:6px 16px;
border-radius:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.10);
}

.container{
display:flex;
gap:30px;
padding:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
padding:25px;
}

.dashboard{flex:1;min-width:650px;}
.formBox{width:350px;}

h3{margin-top:0;color:#1f3c88;}

select,button{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:15px;
}

button{
background:#1f3c88;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{background:#142a63;}

.vehicle-tabs{
display:flex;
gap:10px;
margin-bottom:18px;
justify-content:center;
flex-wrap:wrap;
}

.vehicle-tab-btn{
background:#e9ecef;
color:#1f3c88;
border:none;
padding:8px 20px;
border-radius:20px;
font-weight:700;
cursor:pointer;
}

.vehicle-tab-btn.active{
background:#1f3c88;
color:white;
}

.calendar-nav{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:15px;
}

table{width:100%;border-collapse:collapse;}

th{
background:#1f3c88;
color:white;
padding:8px;
}

td{
border:1px solid #ddd;
padding:4px;
text-align:center;
}

.slotCell{
display:block;
padding:7px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.free{
background:#2a9d8f;
color:white;
}

.free:hover{
background:linear-gradient(90deg,#ffe066,#ffd700);
color:#222;
}

.blocked{
background:#e63946;
color:white;
font-weight:600;
}

.selected-slot{
background:linear-gradient(90deg,#ffb347,#ffcc33)!important;
color:#222!important;
outline:3px solid #ffb347;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="toyota.png" class="logo">
<span>Showroom Vehicle Blocking Dashboard</span>
</header>

<div class="container">

<div class="card dashboard">
<div id="vehicleTabs" class="vehicle-tabs"></div>

<div class="calendar-nav">
<button onclick="changeWeek(-1)">◀ Prev</button>
<b id="weekLabel"></b>
<button onclick="changeWeek(1)">Next ▶</button>
</div>

<table id="calendar"></table>
</div>

<div class="card formBox">
<h3>Block Vehicle</h3>
<select id="vehicle"></select>
<select id="slot"></select>
<select id="sales">
<option>Nevin</option>
<option>Allwin</option>
<option>Aslam</option>
<option>Jimmy</option>
</select>
<button onclick="blockVehicle()">Block Vehicle</button>
<p id="msg"></p>
</div>

</div>

<script>

const vehicles=["Glanza","Taisor","Hyryder","Rumion","Crysta","Hycross","Fortuner"];
const slots=["9-11","11-1","1-3","3-5","5-7"];

let bookings={};
let selectedVehicle=vehicles[0];
let selectedDate=null;
let selectedSlot=null;

let currentMonday=getMonday(new Date());

function getMonday(d){
d=new Date(d);
let day=d.getDay();
let diff=d.getDate()-day+(day===0?-6:1);
return new Date(d.setDate(diff));
}

function formatDate(d){
return d.toISOString().slice(0,10);
}

function renderForm(){
vehicle.innerHTML=vehicles.map(v=>`<option>${v}</option>`).join("");
slot.innerHTML=slots.map(s=>`<option>${s}</option>`).join("");
}

function renderTabs(){
vehicleTabs.innerHTML=vehicles.map(v=>
`<button class="vehicle-tab-btn ${v===selectedVehicle?'active':''}"
onclick="changeVehicle('${v}')">${v}</button>`
).join("");
}

function changeVehicle(v){
selectedVehicle=v;
renderTabs();
renderCalendar();
}

function renderCalendar(){

calendar.innerHTML="";
let week=[];
let head="<tr><th>Slot</th>";

for(let i=0;i<7;i++){
let d=new Date(currentMonday);
d.setDate(d.getDate()+i);
week.push(new Date(d));
head+=`<th>${d.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</th>`;
}

head+="</tr>";
calendar.innerHTML+=head;

slots.forEach(s=>{

let row=`<tr><td><b>${s}</b></td>`;

week.forEach(d=>{

let dateStr=formatDate(d);
let booked=bookings[dateStr]?.[selectedVehicle]?.[s];

let cls=booked?"blocked":"free";
let text=booked?booked:"FREE";

let highlight=(selectedDate===dateStr && selectedSlot===s)
?"selected-slot":"";

row+=`
<td>
<span class="slotCell ${cls} ${highlight}"
onclick="selectSlot('${selectedVehicle}','${dateStr}','${s}')">
${text}
</span>
</td>
`;

});

row+="</tr>";
calendar.innerHTML+=row;

});

weekLabel.innerText=
week[0].toLocaleDateString()+" - "+
week[6].toLocaleDateString();

}

function selectSlot(v,date,s){

selectedVehicle=v;
selectedDate=date;
selectedSlot=s;

vehicle.value=v;
slot.value=s;

msg.innerHTML=`Selected ${v} on ${date} (${s})`;

renderTabs();
renderCalendar();

document.querySelector('.formBox')
.scrollIntoView({behavior:'smooth',block:'center'});
}

function blockVehicle(){

if(!selectedDate){
msg.innerHTML="⚠ Select slot from calendar";
return;
}

let v=vehicle.value;
let s=slot.value;
let salesName=sales.value;

bookings[selectedDate]=bookings[selectedDate]||{};
bookings[selectedDate][v]=bookings[selectedDate][v]||{};

if(bookings[selectedDate][v][s]){
msg.innerHTML="❌ Already Booked";
return;
}

bookings[selectedDate][v][s]=salesName;

msg.innerHTML=`✅ ${v} blocked on ${selectedDate} (${s}) by ${salesName}`;

selectedDate=null;
selectedSlot=null;

renderCalendar();
}

function changeWeek(x){
currentMonday.setDate(currentMonday.getDate()+7*x);
renderCalendar();
}

window.onload=function(){
renderForm();
renderTabs();
renderCalendar();
}

</script>

</body>
</html>
