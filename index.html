<!DOCTYPE html>
<html>
<head>
<title>Showroom Vehicle Blocking Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}
body{font-family:'Segoe UI',Arial;margin:0;background:#f4f6f9;color:#333;}

header{
background:#1f3c88;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:18px;
font-weight:600;
position:sticky;
top:0;
z-index:1000;
}

.logo{
height:40px;
background:white;
padding:4px 10px;
border-radius:12px;
}

.container{
display:flex;
gap:20px;
padding:12px;
flex-wrap:wrap;
justify-content:center;
}

/* IMPORTANT MOBILE SPACE FOR STICKY PANEL */
.dashboard{
flex:1;
min-width:650px;
padding-bottom:260px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
padding:16px;
}

.formBox{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-radius:18px 18px 0 0;
box-shadow:0 -6px 20px rgba(0,0,0,0.18);
padding:12px;
z-index:999;
}

h3{margin-top:0;color:#1f3c88;}

select,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:8px;
font-size:16px;
}

button{
background:#1f3c88;
color:white;
font-weight:700;
cursor:pointer;
}

.vehicle-tabs{
display:flex;
gap:8px;
margin-bottom:10px;
overflow-x:auto;
flex-wrap:nowrap;
}

.vehicle-tab-btn{
background:#e9ecef;
color:#1f3c88;
border:none;
padding:10px 16px;
border-radius:20px;
font-weight:700;
white-space:nowrap;
}

.vehicle-tab-btn.active{
background:#1f3c88;
color:white;
}

.calendar-nav{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:10px;
}

.calendar-nav button{
padding:8px 12px;
}

.tableWrap{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
font-size:14px;
}

th{
background:#1f3c88;
color:white;
padding:10px 6px;
}

td{
border:1px solid #ddd;
padding:4px;
text-align:center;
}

.slotCell{
display:block;
padding:16px 6px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.free{
background:#2a9d8f;
color:white;
}

.blocked{
background:#e63946;
color:white;
}

.selected-slot{
background:#ffd166!important;
color:black!important;
outline:3px solid orange;
}

/* FLOAT TODAY BUTTON */
.todayBtn{
position:fixed;
right:15px;
bottom:250px;
background:#2a9d8f;
border:none;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:700;
z-index:998;
}

/* DESKTOP */
@media(min-width:900px){
.formBox{
position:static;
width:350px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
border-radius:12px;
}
.dashboard{
padding-bottom:0;
}
.todayBtn{
bottom:30px;
}
}
</style>
</head>

<body>

<header>
<img src="toyota.png" class="logo">
<span>Showroom Vehicle Blocking Dashboard</span>
</header>

<div class="container">

<div class="card dashboard">
<div id="vehicleTabs" class="vehicle-tabs"></div>

<div class="calendar-nav">
<button onclick="changeWeek(-1)">◀ Prev</button>
<b id="weekLabel"></b>
<button onclick="changeWeek(1)">Next ▶</button>
</div>

<div class="tableWrap">
<table id="calendar"></table>
</div>
</div>

<div class="card formBox">
<h3>Block Vehicle</h3>
<select id="vehicle"></select>
<select id="slot"></select>
<select id="sales">
<option>Nevin</option>
<option>Allwin</option>
<option>Aslam</option>
<option>Jimmy</option>
</select>
<button onclick="blockVehicle()">Block Vehicle</button>
<p id="msg"></p>
</div>

</div>

<button class="todayBtn" onclick="goToday()">Today</button>

<script>

const vehicles=["Glanza","Taisor","Hyryder","Rumion","Crysta","Hycross","Fortuner"];
const slots=["9-11","11-1","1-3","3-5","5-7"];

let bookings={};
let selectedVehicle=vehicles[0];
let selectedDate=null;
let selectedSlot=null;

let currentMonday=getMonday(new Date());

function getMonday(d){
d=new Date(d);
let day=d.getDay();
let diff=d.getDate()-day+(day===0?-6:1);
return new Date(d.setDate(diff));
}

function formatDate(d){
return d.toISOString().slice(0,10);
}

function renderForm(){
document.getElementById("vehicle").innerHTML=
vehicles.map(v=>`<option>${v}</option>`).join("");

document.getElementById("slot").innerHTML=
slots.map(s=>`<option>${s}</option>`).join("");
}

function renderTabs(){
const tabs=document.getElementById("vehicleTabs");
tabs.innerHTML=vehicles.map(v=>
`<button class="vehicle-tab-btn ${v===selectedVehicle?'active':''}"
onclick="changeVehicle('${v}')">${v}</button>`).join("");
}

function changeVehicle(v){
selectedVehicle=v;
renderTabs();
renderCalendar();
}

function renderCalendar(){

const calendar=document.getElementById("calendar");
calendar.innerHTML="";

let week=[];
let head="<tr><th>Slot</th>";

for(let i=0;i<7;i++){
let d=new Date(currentMonday);
d.setDate(d.getDate()+i);
week.push(new Date(d));

head+=`<th>${d.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</th>`;
}

head+="</tr>";
calendar.innerHTML+=head;

slots.forEach(s=>{
let row=`<tr><td><b>${s}</b></td>`;

week.forEach(d=>{
let dateStr=formatDate(d);
let booked=bookings[dateStr]?.[selectedVehicle]?.[s];

let cls=booked?"blocked":"free";
let text=booked?booked:"FREE";

let highlight=(selectedDate===dateStr && selectedSlot===s)?"selected-slot":"";

row+=`<td>
<span class="slotCell ${cls} ${highlight}"
onclick="selectSlot('${selectedVehicle}','${dateStr}','${s}')">
${text}
</span>
</td>`;
});

row+="</tr>";
calendar.innerHTML+=row;
});

document.getElementById("weekLabel").innerText=
week[0].toLocaleDateString()+" - "+
week[6].toLocaleDateString();

}

function selectSlot(v,date,s){
selectedVehicle=v;
selectedDate=date;
selectedSlot=s;

document.getElementById("vehicle").value=v;
document.getElementById("slot").value=s;

renderTabs();
renderCalendar();
}

function blockVehicle(){

if(!selectedDate){
document.getElementById("msg").innerHTML="⚠ Select slot";
return;
}

let v=document.getElementById("vehicle").value;
let s=document.getElementById("slot").value;
let salesName=document.getElementById("sales").value;

bookings[selectedDate]=bookings[selectedDate]||{};
bookings[selectedDate][v]=bookings[selectedDate][v]||{};

if(bookings[selectedDate][v][s]){
document.getElementById("msg").innerHTML="❌ Already Booked";
return;
}

bookings[selectedDate][v][s]=salesName;

document.getElementById("msg").innerHTML=
`✅ ${v} blocked on ${selectedDate} (${s})`;

selectedDate=null;
selectedSlot=null;

renderCalendar();
}

function changeWeek(x){
currentMonday.setDate(currentMonday.getDate()+7*x);
renderCalendar();
}

function goToday(){
currentMonday=getMonday(new Date());
renderCalendar();
}

window.onload=function(){
renderForm();
renderTabs();
renderCalendar();
}

</script>

</body>
</html>
