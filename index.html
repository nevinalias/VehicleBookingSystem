<!DOCTYPE html>
<html>
<head>
    <title>Showroom Vehicle Blocking Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <style>
        /* Base styles */
        *{box-sizing:border-box;}
        body{
            font-family:'Segoe UI',Arial,sans-serif; /* Added sans-serif fallback */
            margin:0;
            background:#f4f6f9;
            color:#333;
            -webkit-font-smoothing: antialiased; /* iOS text rendering */
            -moz-osx-font-smoothing: grayscale; /* MacOS text rendering */
        }

        header{
            background:#1f3c88;
            color:white;
            padding:18px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:18px;
            font-size:24px;
            font-weight:600;
            flex-wrap:wrap;
            text-align:center;
        }

      .logo{
            height:70px;
            background:white;
            padding:6px 16px;
            border-radius:16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.10);
            flex-shrink: 0; /* Prevent shrinking on small screens */
        }

      .container{
            display:flex;
            gap:30px;
            padding:30px;
            flex-wrap:wrap;
            justify-content:center;
        }

      .card{
            background:white;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
            padding:25px;
        }

      .dashboard{flex:1;min-width:650px;}
      .formBox{width:350px;}

        h3{margin-top:0;color:#1f3c88;}

        /* Form elements - Increased padding for better touch targets */
        select,button{
            width:100%;
            padding:12px; /* Increased from 11px */
            border-radius:8px;
            border:1px solid #ccc;
            margin-bottom:15px;
            font-size:16px; /* Increased from 15px */
            min-height: 44px; /* Ensure minimum touch target size */
            -webkit-appearance: none; /* Remove default iOS select styling */
            appearance: none;
            background-color: white;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23000000%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-6.5%200-12.3%203.2-16%208.7S.2%2084.7%204.6%2090.3l128%20155c3.2%203.9%207.8%206.1%2012.8%206.1s9.6-2.2%2012.8-6.1l128-155c4.4-5.6%204.6-13%20.2-18.6z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat, repeat;
            background-position: right.7em top 50%, 0 0;
            background-size:.65em auto, 100%;
        }
        select:focus {
            outline: 2px solid #1f3c88; /* Better focus indicator */
            outline-offset: 2px;
        }

        button{
            background:#1f3c88;
            color:white;
            font-weight:600;
            cursor:pointer;
            transition:background-color 0.2s; /* Transition for smoother hover */
        }

        button:hover{background:#142a63;}

      .vehicle-tabs{
            display:flex;
            gap:10px;
            margin-bottom:18px;
            justify-content:center;
            flex-wrap:wrap;
        }

      .vehicle-tab-btn{
            background:#e9ecef;
            color:#1f3c88;
            border:none;
            padding:10px 22px; /* Increased padding */
            border-radius:20px;
            font-weight:700;
            cursor:pointer;
            min-width: 80px; /* Ensure a decent minimum width */
            min-height: 40px; /* Ensure minimum touch target size */
            transition: background-color 0.2s, color 0.2s;
        }

      .vehicle-tab-btn.active{
            background:#1f3c88;
            color:white;
        }

      .calendar-nav{
            display:flex;
            justify-content:center;
            gap:15px;
            margin-bottom:15px;
        }
      .calendar-nav button {
            width: auto; /* Override 100% width for these buttons */
            min-width: 44px; /* Minimum touch target for nav buttons */
            min-height: 44px;
            padding: 8px 15px;
            font-size: 18px; /* Larger arrows */
        }
      .calendar-nav b {
            display: flex;
            align-items: center;
            font-size: 1.1em; /* Make week label a bit larger */
        }

      .tableWrap{
            width:100%;
            overflow-x:auto; /* Keeps horizontal scrolling for table */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        table{
            width:100%;
            border-collapse:collapse;
            min-width:700px; /* Ensures horizontal scroll on small screens */
        }

        th{
            background:#1f3c88;
            color:white;
            padding:10px 8px; /* Increased padding */
            text-align: center;
            position: sticky; /* Make headers sticky for better UX with scrolling */
            top: 0;
            z-index: 10;
        }
        th:first-child {
            left: 0;
            z-index: 11; /* Ensure first column header is above others */
        }

        td{
            border:1px solid #ddd;
            padding:4px;
            text-align:center;
            vertical-align: middle; /* Center content vertically */
        }
        td:first-child {
            position: sticky; /* Make first column sticky */
            left: 0;
            background-color: white;
            z-index: 9; /* Ensure it's above other cells when scrolling */
            font-weight: bold;
        }

      .slotCell{
            display:block;
            padding:10px 5px; /* Increased padding for better touch area */
            border-radius:6px;
            cursor:pointer;
            transition:background-color 0.2s, color 0.2s;
            min-height: 44px; /* Ensure minimum touch target size */
            display: flex; /* Use flex to center text vertically */
            align-items: center;
            justify-content: center;
        }

      .free{ background:#2a9d8f; color:white; }
      .free:hover{ background:linear-gradient(90deg,#ffe066,#ffd700); color:#222; }

      .blocked{ background:#e63946; color:white; font-weight:600; }

      .selected-slot{
            background:linear-gradient(90deg,#ffb347,#ffcc33)!important;
            color:#222!important;
            outline:3px solid #ffb347;
            font-weight:bold;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width:600px){
            header{
                font-size:18px;
                padding:12px;
                gap:10px;
            }

          .logo{
                height:40px;
                padding:4px 10px;
            }

          .container{
                flex-direction:column;
                padding:12px;
                gap:16px;
            }

          .dashboard{ min-width:100%; }
          .formBox{ width:100%; }

          .card{ padding:16px; }

          .vehicle-tab-btn{
                padding:12px;
                font-size:14px;
                flex:1;
                min-width: unset; /* Let it shrink on small screens */
            }

            select,button{
                font-size:16px;
                min-height:48px; /* Slightly larger touch target on smaller screens */
            }

          .calendar-nav{ gap:8px; font-size:14px; }
          .calendar-nav button {
                min-height: 48px; /* Slightly larger touch target on smaller screens */
                min-width: 48px;
            }

            table{ font-size:13px; }
            th,td{ padding:8px 6px; }
          .slotCell{ padding:12px 5px; /* More padding for easier tapping */ min-height: 48px; }

            th:first-child, td:first-child {
                box-shadow: 2px 0 5px rgba(0,0,0,0.1); /* Add shadow to sticky column for visual separation */
            }
        }
    </style>
</head>

<body>

<header>
    <img src="toyota.png" class="logo" alt="Toyota Logo">
    <span>Showroom Vehicle Blocking Dashboard</span>
</header>

<div class="container">

    <div class="card dashboard">
        <div id="vehicleTabs" class="vehicle-tabs" role="tablist"></div>

        <div class="calendar-nav">
            <button onclick="changeWeek(-1)" aria-label="Previous week">◀ Prev</button>
            <b id="weekLabel"></b>
            <button onclick="changeWeek(1)" aria-label="Next week">Next ▶</button>
        </div>

        <div class="tableWrap">
            <table id="calendar" role="grid" aria-label="Vehicle Blocking Calendar"></table>
        </div>

    </div>

    <div class="card formBox">
        <h3>Block Vehicle</h3>
        <label for="vehicle" class="visually-hidden">Select Vehicle</label>
        <select id="vehicle" aria-label="Select vehicle to block"></select>

        <label for="slot" class="visually-hidden">Select Time Slot</label>
        <select id="slot" aria-label="Select time slot to block"></select>

        <label for="sales" class="visually-hidden">Select Sales Person</label>
        <select id="sales" aria-label="Select sales person"></select>
        <button onclick="blockVehicle()">Block Vehicle</button>
        <p id="msg" role="status" aria-live="polite"></p>
    </div>

</div>

<script>
    const vehicles=["Glanza","Taisor","Hyryder","Rumion","Crysta","Hycross","Fortuner"];
    const slots=["9-11","11-1","1-3","3-5","5-7"];
    const salesPeople=["Nevin","Allwin","Aslam","Jimmy"]; // Added the sales people array

    let bookings={};
    let selectedVehicle=vehicles[0];
    let selectedDate=null;
    let selectedSlot=null;

    let currentMonday=getMonday(new Date());

    function getMonday(d){
        d=new Date(d);
        let day=d.getDay();
        let diff=d.getDate()-day+(day===0?-6:1);
        return new Date(d.setDate(diff));
    }

    function formatDate(d){
        return d.toISOString().slice(0,10);
    }

    function renderForm(){
        const vehicleSelect = document.getElementById("vehicle");
        vehicleSelect.innerHTML= vehicles.map(v=>`<option value="${v}">${v}</option>`).join(""); // Added value attribute

        const slotSelect = document.getElementById("slot");
        slotSelect.innerHTML= slots.map(s=>`<option value="${s}">${s}</option>`).join(""); // Added value attribute

        // NEW: Render the sales people dropdown
        const salesSelect = document.getElementById("sales");
        salesSelect.innerHTML= salesPeople.map(person => `<option value="${person}">${person}</option>`).join("");
    }

    function renderTabs(){
        const tabs=document.getElementById("vehicleTabs");

        tabs.innerHTML=vehicles.map(v=>
            `<button class="vehicle-tab-btn ${v===selectedVehicle?'active':''}"
                     onclick="changeVehicle('${v}')"
                     role="tab"
                     aria-selected="${v===selectedVehicle}"
                     aria-controls="calendar"
                     id="tab-${v.toLowerCase().replace(/\s/g, '')}">
                     ${v}
             </button>`
        ).join("");
    }

    function changeVehicle(v){
        selectedVehicle=v;
        renderTabs();
        renderCalendar();
    }

    function renderCalendar(){
        const calendar=document.getElementById("calendar");
        calendar.innerHTML="";

        let week=[];
        let head="<thead><tr><th>Slot</th>"; // Added thead

        for(let i=0;i<7;i++){
            let d=new Date(currentMonday);
            d.setDate(d.getDate()+i);
            week.push(new Date(d));

            head+=`<th scope="col">${d.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</th>`; // Added scope="col"
        }

        head+="</tr></thead><tbody>"; // Added tbody start

        let bodyRows = "";
        slots.forEach(s=>{
            bodyRows+=`<tr><th scope="row"><b>${s}</b></th>`; // Added scope="row"

            week.forEach(d=>{
                let dateStr=formatDate(d);
                let booked=bookings[dateStr]?.[selectedVehicle]?.[s];

                let cls=booked?"blocked":"free";
                let text=booked?booked:"FREE";

                let highlight=(selectedDate===dateStr && selectedSlot===s)?"selected-slot":"";

                bodyRows+=`
                    <td>
                        <span class="slotCell ${cls} ${highlight}"
                              onclick="selectSlot('${selectedVehicle}','${dateStr}','${s}')"
                              role="button"
                              tabindex="0"
                              aria-label="${booked? booked + ' on ' + d.toLocaleDateString() + ' ' + s : 'Free slot on ' + d.toLocaleDateString() + ' ' + s}">
                            ${text}
                        </span>
                    </td>
                `;
            });

            bodyRows+="</tr>";
        });
        calendar.innerHTML = head + bodyRows + "</tbody>"; // Closed tbody
        document.getElementById("weekLabel").innerText=
            week[0].toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
            " - " +
            week[6].toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function selectSlot(v,date,s){
        selectedVehicle=v;
        selectedDate=date;
        selectedSlot=s;

        document.getElementById("vehicle").value=v;
        document.getElementById("slot").value=s;

        const msgElement = document.getElementById("msg");
        msgElement.innerHTML= `Selected ${v} on ${date} (${s})`;
        msgElement.focus(); // Focus on message for screen readers

        renderTabs();
        renderCalendar();

        document.querySelector('.formBox')
          .scrollIntoView({behavior:'smooth',block:'center'});
    }

    function blockVehicle(){
        const msgElement = document.getElementById("msg");

        if(!selectedDate){
            msgElement.innerHTML= "⚠ Select slot from calendar";
            msgElement.focus();
            return;
        }

        let v=document.getElementById("vehicle").value;
        let s=document.getElementById("slot").value;
        let salesName=document.getElementById("sales").value;

        bookings[selectedDate]=bookings[selectedDate]||{};
        bookings[selectedDate][v]=bookings[selectedDate][v]||{};

        if(bookings[selectedDate][v][s]){
            msgElement.innerHTML= "❌ Already Booked";
            msgElement.focus();
            return;
        }

        bookings[selectedDate][v][s]=salesName;

        msgElement.innerHTML= `✅ ${v} blocked on ${selectedDate} (${s}) by ${salesName}`;
        msgElement.focus();

        selectedDate=null;
        selectedSlot=null;

        renderCalendar();
    }

    function changeWeek(x){
        currentMonday.setDate(currentMonday.getDate()+7*x);
        renderCalendar();
    }

    // Add keyboard navigation for slots
    document.addEventListener('keydown', function(event) {
        if (event.target.classList.contains('slotCell') && event.key === 'Enter') {
            event.target.click();
        }
    });

    window.onload=function(){
        renderForm();
        renderTabs();
        renderCalendar();
        // NEW: Call renderSales to populate the sales dropdown
        // renderSales(); // This is now part of renderForm
    }

</script>

<!-- Simple style to hide labels visually but keep them for screen readers -->
<style>
  .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
    }
</style>

</body>
</html>
