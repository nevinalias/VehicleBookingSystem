<!DOCTYPE html>
<html>
<head>

<title>Showroom Vehicle Blocking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}
body{font-family:'Segoe UI',Arial;margin:0;background:#f4f6f9;color:#333;}

header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:600;
}

.container{
display:flex;
gap:30px;
padding:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
padding:25px;
}

.formBox{width:350px;}
.dashboard{flex:1;min-width:650px;}

h3{margin-top:0;color:#1f3c88;}

select,button{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
background:#1f3c88;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{background:#142a63;}

.slotCell{
display:block;
padding:6px;
border-radius:4px;
cursor:pointer;
}

.free{background:#2a9d8f;color:white;}
.blocked{background:#e63946;color:white;font-weight:600;}

.vehicle-tabs{
display:flex;
gap:10px;
margin-bottom:18px;
justify-content:center;
}

.vehicle-tab-btn{
background:#e9ecef;
color:#1f3c88;
border:none;
padding:8px 18px;
border-radius:18px;
font-weight:700;
cursor:pointer;
}

.vehicle-tab-btn.active{
background:#1f3c88;
color:white;
}

.calendar-nav{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1f3c88;
color:white;
padding:8px;
}

td{
border:1px solid #ddd;
padding:4px;
text-align:center;
}

</style>
<style>
@media (max-width: 600px) {
	header {
		font-size: 18px;
		padding: 12px;
	}
	.container {
		flex-direction: column;
		gap: 16px;
		padding: 10px;
	}
	.formBox, .dashboard {
		width: 100% !important;
		min-width: unset !important;
		box-sizing: border-box;
		padding: 10px;
	}
	.card {
		padding: 12px;
	}
	h3 {
		font-size: 20px;
	}
	select, button {
		font-size: 16px;
		padding: 8px;
	}
	.vehicle-tabs {
		flex-wrap: wrap;
		gap: 6px;
	}
	.vehicle-tab-btn {
		padding: 6px 10px;
		font-size: 14px;
	}
	.calendar-nav {
		gap: 8px;
		font-size: 14px;
	}
	table {
		font-size: 13px;
		display: block;
		overflow-x: auto;
		width: 100%;
	}
	th, td {
		padding: 6px 2px;
		min-width: 60px;
	}
	img[alt="Nippon Logo"] {
		height: 40px !important;
		margin-right: 8px !important;
		padding: 4px 8px !important;
	}
}
</style>
</head>

<body>

<header>
	<img src="toyota.png" alt="Nippon Logo" style="height:70px; background:white; padding:6px 16px; border-radius:16px; vertical-align:middle; margin-right:18px; box-shadow:0 2px 8px rgba(0,0,0,0.10);">
	Showroom Vehicle Blocking Dashboard
</header>

<div class="container">

<div class="card formBox">

<h3>Block Vehicle</h3>

<select id="vehicle"></select>
<select id="slot"></select>
<select id="sales">
<option>Nevin</option>
<option>Allwin</option>
<option>Aslam</option>
<option>Jimmy</option>
</select>

<button onclick="blockVehicle()">Block Vehicle</button>

<p id="msg"></p>

</div>

<div class="card dashboard">

<div id="vehicleTabs" class="vehicle-tabs"></div>

<div class="calendar-nav">
<button onclick="changeWeek(-1)">◀ Prev</button>
<b id="calendarWeek"></b>
<button onclick="changeWeek(1)">Next ▶</button>
</div>

<table id="calendarGrid"></table>

</div>
</div>

<script>

const vehicles=["Glanza","Taisor","Hyryder","Rumion","Crysta","Hycross","Fortuner"];
const slots=["9-11","11-1","1-3","3-5","5-7"];

let bookings={};
let selectedVehicle=vehicles[0];
let currentMonday=getMonday(new Date());

function getMonday(d){
d=new Date(d);
let day=d.getDay();
let diff=d.getDate()-day+(day===0?-6:1);
return new Date(d.setDate(diff));
}

function formatDate(date){
return date.toISOString().slice(0,10);
}

function renderForm(){
document.getElementById("vehicle").innerHTML=
vehicles.map(v=>`<option>${v}</option>`).join("");

document.getElementById("slot").innerHTML=
slots.map(s=>`<option>${s}</option>`).join("");
}

function renderVehicleTabs(){
const div=document.getElementById("vehicleTabs");
div.innerHTML=vehicles.map(v=>
`<button class="vehicle-tab-btn ${v===selectedVehicle?'active':''}"
onclick="selectVehicle('${v}')">${v}</button>`
).join("");
}

function selectVehicle(v){
selectedVehicle=v;
renderVehicleTabs();
renderCalendar();
}

function renderCalendar(){

const grid=document.getElementById("calendarGrid");
grid.innerHTML="";

let header="<tr><th>Slot</th>";
let week=[];

for(let i=0;i<7;i++){
let d=new Date(currentMonday);
d.setDate(d.getDate()+i);
week.push(new Date(d));
header+=`<th>${d.toLocaleDateString(undefined,{weekday:'short',day:'numeric'})}</th>`;
}

header+="</tr>";
grid.innerHTML+=header;

slots.forEach(slot=>{
let row=`<tr><td><b>${slot}</b></td>`;

week.forEach(date=>{
let dateStr=formatDate(date);
let booked=bookings[dateStr]?.[selectedVehicle]?.[slot];
let cls=booked?"blocked":"free";
let text=booked?booked:"FREE";

row+=`<td>
<span class="slotCell ${cls}"
onclick="selectSlot('${selectedVehicle}','${dateStr}','${slot}')">
${text}
</span>
</td>`;
});

row+="</tr>";
grid.innerHTML+=row;
});

document.getElementById("calendarWeek").innerText=
week[0].toLocaleDateString()+" - "+week[6].toLocaleDateString();
}

function selectSlot(vehicle,date,slot){

document.getElementById("vehicle").value=vehicle;
document.getElementById("slot").value=slot;
document.getElementById("vehicle").dataset.date=date;

document.getElementById("msg").innerHTML=
`Selected ${vehicle} on ${date} (${slot})`;
}

function blockVehicle(){

let v=document.getElementById("vehicle").value;
let s=document.getElementById("slot").value;
let sales=document.getElementById("sales").value;
let date=document.getElementById("vehicle").dataset.date;

if(!date){
document.getElementById("msg").innerHTML="⚠ Select slot from calendar";
return;
}

bookings[date]=bookings[date]||{};
bookings[date][v]=bookings[date][v]||{};

if(bookings[date][v][s]){
document.getElementById("msg").innerHTML="❌ Already Booked";
return;
}

bookings[date][v][s]=sales;

document.getElementById("msg").innerHTML=
`✅ ${v} blocked on ${date} (${s}) by ${sales}`;

renderCalendar();
}

function changeWeek(x){
currentMonday.setDate(currentMonday.getDate()+7*x);
renderCalendar();
}

window.onload=function(){
renderForm();
renderVehicleTabs();
renderCalendar();
}

</script>

</body>
</html>
